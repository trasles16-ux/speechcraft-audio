name: Build SpeechCraft EXE
on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -r requirements.txt pyinstaller
      - name: Build
        run: pyinstaller SpeechCraft.spec --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: SpeechCraft-Windows
          path: dist/*.exe
          retention-days: 30
